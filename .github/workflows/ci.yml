name: CI Pipeline

on:
  push:
    branches: [ "main", "devsecops" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # This ensures the full Git history is fetched for proper commit tagging usefull for gitleaks

      #Shield 1: Secret Scanning
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      #Shield 2: Infra as code scan
      - name: Checkov K8s scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          framework: kubernetes
          soft-fail: false # Pipeline fails if it is insecure

  build-and-push:
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:${{ github.sha }}
        # Shield 3: Scan the image for vulnerabilities
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@57a97c7d7c11f19576c002772f061179196b7483

        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1' # Pipeline fails if vulnerabilities are found
          severity: 'HIGH,CRITICAL'

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:${{ github.sha }}
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:latest
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
