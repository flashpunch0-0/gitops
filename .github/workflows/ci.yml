name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Docker Buildx (Allows for faster builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build and Push
      # We tag it with 'latest' AND the specific commit ID (SHA)
      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/python-devops-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max